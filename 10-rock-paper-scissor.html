<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="/game/10-rps.css">
   <title>Document</title>
</head>

<body>
   <p class="title">Rock Paper Scissors</p>
   <button class="move-button" onclick="
      playGame('rock');
   ">
   <img class="move-icon" src="/game/images/rock-emoji.png" alt="rock">
</button>

   <button class="move-button" onclick="
      playGame('paper');
   "><img src="/game/images/paper-emoji.png" alt="paper" class="move-icon"></button>

   <button class="move-button" onclick="
      playGame('scissors');
   "><img src="/game/images/scissors-emoji.png" alt="scissor" class="move-icon"></button>

   <p class="js-result result"></p>
   <p class="js-score result"></p>
   <p class="js-moves result"></p>

   <button onclick="
      score.wins = 0;
      score.losses = 0;
      score.ties = 0;
      localStorage.removeItem('score');
      updateScoreElement();">Reset Score</button>

   <script>
      let score = JSON.parse(localStorage.getItem('score')) || {
         wins: 0,
         losses: 0,
         ties: 0
      };

      updateScoreElement();


      function playGame(playerMove) {
         const computerMove = pickComputerMove();

         let result = '';

         if (playerMove === 'scissors') {
            if (computerMove === 'rock') {
               result = 'You lose.';
            } else if (computerMove === 'paper') {
               result = 'You win.';
            } else if (computerMove === 'scissors') {
               result = 'Tie.';
            }

         } else if (playerMove === 'paper') {
            if (computerMove === 'rock') {
               result = 'You win.';
            } else if (computerMove === 'paper') {
               result = 'Tie.';
            } else if (computerMove === 'scissors') {
               result = 'You lose.';
            }

         } else if (playerMove === 'rock') {
            if (computerMove === 'rock') {
               result = 'Tie.';
            } else if (computerMove === 'paper') {
               result = 'You lose.';
            } else if (computerMove === 'scissors') {
               result = 'You win.';
            }
         }

         if (result === 'You win.') {
            score.wins += 1;
         } else if (result === 'You lose.') {
            score.losses += 1;
         } else if (result === 'Tie.') {
            score.ties += 1;
         }

         localStorage.setItem('score', JSON.stringify(score));

         updateScoreElement();

         document.querySelector('.js-result').innerHTML = result;

         document.querySelector('.js-moves').innerHTML = `You ${playerMove} - ${computerMove} Computer`;
      }

      function updateScoreElement() {
         document.querySelector('.js-score')
            .innerHTML = `Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`;
      }

      function pickComputerMove() {
         const randomNumber = Math.random();

         let computerMove = '';

         if (randomNumber >= 0 && randomNumber < 1 / 3) {
            computerMove = 'rock';
         } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
            computerMove = 'paper';
         } else if (randomNumber >= 2 / 3 && randomNumber < 1) {
            computerMove = 'scissors';
         }

         return computerMove;
      }
   </script>
</body>

</html>
